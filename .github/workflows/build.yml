name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: pip install flet
          
      - name: Build iOS Project
        run: |
          # Пытаемся собрать проект. Если упадет — не страшно, идем дальше.
          flet build ipa --yes --flutter-build-args="--no-codesign" || true
          
      - name: Diagnostic & Create IPA
        run: |
          echo "--- Ищем скомпилированное приложение (.app) ---"
          # Эта команда выведет список всех папок .app, которые удалось создать
          find build -name "*.app" -type d
          
          # Создаем структуру Payload
          mkdir -p Payload
          
          # Пытаемся скопировать .app файл. 
          # Мы берем первый найденный .app, который НЕ для симулятора.
          APP_PATH=$(find build/ios -name "*.app" | grep -v "simulator" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ОШИБКА: Приложение .app не найдено. Сборка не удалась."
            exit 1
          fi
          
          echo "Копируем приложение из: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # Проверяем, что внутри Payload что-то есть
          ls -R Payload/
          
          # Упаковываем правильно: внутри архива должна быть только папка Payload
          zip -r my_app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: my_app.ipa
