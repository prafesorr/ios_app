name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: pip install flet
          
      - name: Build iOS Project
        run: |
          # Собираем из корня (точка .)
          # Мы добавили || true, потому что Flet может выдать ошибку в самом конце 
          # из-за отсутствия подписи, но .app файл при этом уже будет готов.
          flet build ipa . --yes --product "kunigram" --icon "assets/icon.png" --flutter-build-args="--no-codesign" || true
          
      - name: Diagnostic & Create IPA
        run: |
          echo "--- Поиск скомпилированного .app ---"
          # Ищем любой файл .app во всех папках
          APP_PATH=$(find . -name "*.app" -type d | grep -v "simulator" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ОШИБКА: Приложение .app не найдено!"
            ls -R
            exit 1
          fi
          
          echo "Приложение найдено: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r my_app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: my_app.ipa
