name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Установка конкретной версии Flutter помогает избежать ошибок совместимости
          flutter-version: '3.19.0' 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet and Dependencies
        run: |
          pip install flet
          # Команда ниже нужна, чтобы убедиться, что все зависимости для iOS готовы
          flutter doctor

      - name: Build IPA
        run: |
          # Мы добавляем --verbose, чтобы если упадет, мы видели точную причину
          flet build ipa --no-bypass-checks --verbose
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/ios/ipa/*.ipa
          overwrite: true
