name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet
          
      - name: Build iOS Project
        # Мы используем "|| true", чтобы даже если сборка "упадет" из-за отсутствия подписи, скрипт шел дальше
        run: |
          flet build ipa --yes --flutter-build-args="--no-codesign" || true
          
      - name: Create IPA Manually
        run: |
          # Создаем структуру для Sideloadly
          mkdir -p Payload
          # Ищем скомпилированное приложение в папках, куда его мог положить Flet
          # Мы проверяем две возможные папки
          if [ -d "build/ios/iphoneos" ]; then
            cp -r build/ios/iphoneos/*.app Payload/
          elif [ -d "build/ios/archive" ]; then
            cp -r build/ios/archive/*.xcarchive/Products/Applications/*.app Payload/
          fi
          # Упаковываем в .ipa
          zip -r my_app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: my_app.ipa
