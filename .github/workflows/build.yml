name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet and Pillow
        run: |
          pip install flet Pillow
          
      - name: Fix Icon (Prepare for Apple)
        run: |
          # Flet сам подцепит иконку из assets/icon.png, 
          # но мы должны убедиться, что она идеальна (без прозрачности)
          python - <<EOF
          from PIL import Image
          import os
          icon_path = "assets/icon.png"
          if os.path.exists(icon_path):
              img = Image.open(icon_path).convert("RGBA")
              # Создаем белый фон
              background = Image.new("RGB", img.size, (255, 255, 255))
              background.paste(img, mask=img.split()[3])
              background.save(icon_path, "PNG")
              print("Иконка обработана и сохранена в assets/icon.png")
          else:
              print("ВНИМАНИЕ: Иконка не найдена в assets/icon.png")
          EOF

      - name: Build iOS Project
        run: |
          flet build ipa . --yes \
            --product "kunigram" \
            --bundle-id "com.markdog.kunigram" \
            --no-ios-splash \
            --splash-color "#000000" \
            --flutter-build-args="--no-codesign" || true
          
      - name: Diagnostic & Create IPA
        run: |
          echo "--- Поиск скомпилированного .app ---"
          APP_PATH=$(find . -name "*.app" -type d | grep -v "simulator" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ОШИБКА: Приложение .app не найдено!"
            ls -R
            exit 1
          fi
          
          echo "Приложение найдено: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r my_app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: my_app.ipa
