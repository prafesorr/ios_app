name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4 # Обновили до v4

      - name: Install Python
        uses: actions/setup-python@v5 # Обновили до v5
        with:
          python-version: '3.10'

      - name: Install Flet and Dependencies
        run: |
          pip install flet
          # Иногда для сборки нужны дополнительные инструменты Flutter, 
          # Flet сам их подтянет при выполнении команды build

      - name: Build IPA
        run: |
          # Команда для создания неподписанного IPA
          flet build ipa --no-bypass-checks
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # ВОТ ТУТ ГЛАВНОЕ ИСПРАВЛЕНИЕ (v3 на v4)
        with:
          name: app-release
          path: build/ios/ipa/*.ipa
          overwrite: true # Параметр для v4, чтобы можно было перезаписывать файл
