name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: pip install flet
          
      - name: Build iOS Project
        run: |
          # Собираем. Игнорируем ошибку отсутствия подписи.
          flet build ipa --yes --product "kunigram" --icon "assets/icon.png" --flutter-build-args="--no-codesign" || true
          
      - name: Diagnostic & Create IPA
        run: |
          echo "--- Начинаем поиск и упаковку ---"
          
          # Ищем путь к любому .app файлу во всем каталоге build
          APP_PATH=$(find build -name "*.app" -type d | grep -v "simulator" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ОШИБКА: Приложение .app всё еще не найдено!"
            ls -R build
            exit 1
          fi
          
          echo "Приложение найдено здесь: $APP_PATH"
          
          # Создаем структуру для IPA
          mkdir -p Payload
          
          # Копируем найденное приложение в Payload
          cp -r "$APP_PATH" Payload/
          
          # Проверяем, что внутри Payload
          ls -R Payload/
          
          # Упаковываем в IPA
          zip -r my_app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: my_app.ipa
