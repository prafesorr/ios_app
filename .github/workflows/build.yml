name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: pip install flet
          
      - name: Build iOS Project
        run: |
          # 1. Заходим в папку, где лежит твой проект
          cd ios_app
          
          # 2. Запускаем сборку прямо внутри этой папки
          # Точка означает "собирай то, что в этой папке"
          # Путь к иконке теперь простой, так как мы уже внутри ios_app
          flet build ipa . --yes --product "kunigram" --icon "assets/icon.png" --flutter-build-args="--no-codesign"
          
      - name: Diagnostic & Create IPA
        if: always()
        run: |
          echo "--- Поиск скомпилированного .app ---"
          # Ищем во всем репозитории, так как папка build теперь может быть внутри ios_app
          APP_PATH=$(find . -name "*.app" -type d | grep -v "simulator" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ОШИБКА: Приложение .app не найдено!"
            ls -R
            exit 1
          fi
          
          echo "Приложение найдено: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r my_app.ipa Payload
          
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: my_app.ipa
