name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: pip install flet
          
      - name: List files for debug
        run: |
          echo "--- Проверяем структуру файлов ---"
          ls -R
          
      - name: Build iOS Project
        run: |
          # Указываем "." (текущая папка) как путь к приложению.
          # Если flet упадет, мы увидим причину, так как убрали || true
          flet build ipa . --yes --product "kunigram" --icon "assets/icon.png" --flutter-build-args="--no-codesign"
          
      - name: Diagnostic & Create IPA
        if: always() # Запускать, даже если сборка выше упала, чтобы мы видели логи
        run: |
          echo "--- Поиск скомпилированного .app ---"
          APP_PATH=$(find build -name "*.app" -type d | grep -v "simulator" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ОШИБКА: Приложение .app не найдено!"
            # Посмотрим, что вообще создалось в папке build, если она есть
            [ -d "build" ] && ls -R build || echo "Папка build не существует"
            exit 1
          fi
          
          echo "Приложение найдено: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r my_app.ipa Payload
          
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: my_app.ipa
