name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet
          
      - name: Build iOS Project
        run: |
          # Собираем проект без подписи кода (--no-codesign)
          # "yes |" всё еще нужен для подтверждения установки Flutter
          yes | flet build ios --no-codesign
          
      - name: Create IPA Manually
        run: |
          # 1. Создаем папку Payload (это стандарт для iOS приложений)
          mkdir Payload
          # 2. Копируем скомпилированное приложение (.app) в папку Payload
          # Путь обычно такой: build/ios/iphoneos/название_твоего_проекта.app
          cp -r build/ios/iphoneos/*.app Payload/
          # 3. Упаковываем папку Payload в zip-архив и называем его app.ipa
          zip -r app.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: app.ipa # Загружаем наш вручную созданный файл
