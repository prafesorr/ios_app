name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet
          
      - name: Build IPA
        run: |
          # Команда "yes" бесконечно подает на вход букву "y". 
          # Это автоматически ответит "yes" на запрос об установке Flutter.
          yes | flet build ipa
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Ищем любой .ipa файл, который создаст flet, в любой подпапке
          path: "**/*.ipa"
