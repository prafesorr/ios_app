name: Build iOS App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet
          
      - name: Build IPA
        run: |
          # Мы убрали лишние команды, которые вызывали ошибку.
          # Просто запускаем базовую сборку.
          flet build ipa
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # Путь к файлу может немного отличаться в новых версиях, 
          # поэтому мы используем поиск по маске **, чтобы он точно его нашел
          path: build/ios/ipa/*.ipa
